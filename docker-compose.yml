services:
  scanengine:
    build:
      context: .
      dockerfile: Dockerfile
    image: scanengine:latest
    container_name: scanengine
    ports:
      - "8081:8081"
    environment:
      SCANENGINE_ADDR: 0.0.0.0:8081
      RUST_LOG: info,scanengine=debug
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8081/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: scanengine-prometheus
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - scanengine
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: scanengine-grafana
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    restart: unless-stopped
